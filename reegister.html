<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - Piero Hacks</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    .input-wrapper {
  position: relative;
}

.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #555; /* plomo oscuro */
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.password-toggle:hover {
  color: #00ffff;
}

    .phone-box {
  display: flex;
  gap: 10px;
}

#prefix {
  background: #111133;
  border: 1px solid #444;
  padding: 12px;
  border-radius: 10px;
  min-width: 60px;
  text-align: center;
  color: #00ffcc;
  font-weight: bold;
}

.phone-box input {
  flex: 1;
}

.country-info {
  margin-top: -5px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(0,255,200,0.08);
  color: #00ffcc;
  font-size: 14px;
}

.phone-help {
  font-size: 12px;
  color: #aaa;
  margin-top: -5px;
  margin-bottom: 10px;
}

   body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(135deg, #0a0a0f, #1f1f2e, #0a0a0f);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding-top: 80px;
  overflow-y: auto;
}

    .banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: linear-gradient(90deg, #ff00ff, #00ffff);
  color: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 0 0 10px #fff, 0 0 20px #00ffff;
  z-index: 1000;
}

.container {
  background: rgba(15, 15, 35, 0.95);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
  width: 90%;
  max-width: 400px;
  border: 2px solid #00ffcc;
  position: relative;
  z-index: 1;
}

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      color: #00ffff;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ffff;
    }

    label {
      font-size: 14px;
      color: #ff00ff;
    }

   input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #555;
  background: #1b1b35;
  color: #fff;
  font-size: 16px;
  box-sizing: border-box;
}

    input:focus, select:focus {
      border: 2px solid #00ffff;
      box-shadow: 0 0 12px #00ffff;
      outline: none;
    }

button {
  width: 100%;
  padding: 12px; /* mismo tamaño que index */
  border-radius: 8px; /* igual que index */
  border: none;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;

  background: linear-gradient(90deg, #ff00ff, #00ffff);

  /* glow igual que index */
  box-shadow: 0 0 10px #ff00ff, 0 0 15px #00ffff;

  transition: 0.3s;

  /* 🔥 MANTENEMOS TU EFECTO */
  animation: pulse 2s infinite;
}

  @keyframes pulse {
  0% { box-shadow: 0 0 10px #ff00ff, 0 0 15px #00ffff; }
  50% { box-shadow: 0 0 18px #ff00ff, 0 0 25px #00ffff; }
  100% { box-shadow: 0 0 10px #ff00ff, 0 0 15px #00ffff; }
}
    button:hover {
      transform: scale(1.05);
    }

    .terms-container {
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .terms-container input {
      width: 18px;
      height: 18px;
      accent-color: #00ffff;
      cursor: pointer;
    }

    .terms-container a {
      color: #00ffff;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .terms-container a:hover {
      color: #ff00ff;
      text-shadow: 0 0 8px #ff00ff;
    }

    .message {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
      min-height: 25px;
    }

    .success {
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
    }

    .error {
      color: #ff4d4d;
      text-shadow: 0 0 10px #ff4d4d;
    }

    .link {
      text-align: center;
      margin-top: 15px;
    }

    .link a {
      color: #ff00ff;
      text-decoration: none;
      font-weight: bold;
    }

    .link a:hover {
      color: #00ffff;
    }

    /* 🔥 FONDO GRID HACKER */
.background-grid {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background:
    linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 20s linear infinite;
}

/* 🔥 GLOW ANIMADO COMO INDEX */
.background-grid::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;

  background: radial-gradient(circle, rgba(0,255,255,0.25), transparent 70%);

  animation: neonMove 8s ease-in-out infinite;
  opacity: 0.6;
}

/* 🔥 MOVIMIENTO SUAVE */
@keyframes neonMove {
  0% {
    transform: translate(0, 0);
  }
  50% {
    transform: translate(50px, 50px);
  }
  100% {
    transform: translate(0, 0);
  }
}

/* 🔥 PARTÍCULAS */
.particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
}

.particles::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(rgba(0,255,255,0.4) 1px, transparent 1px);
  background-size: 80px 80px;
  animation: particlesMove 25s linear infinite;
  opacity: 0.3;
}

/* 🔥 ANIMACIONES */
@keyframes gridMove {
  0% { background-position: 0 0, 0 0; }
  100% { background-position: 40px 40px, 40px 40px; }
}

@keyframes glowMove {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

@keyframes particlesMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100px); }
}

.background-grid {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;

  background-color: #0a0a0f;
  background-image:
    linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 20s linear infinite;
}

/* 🔥 ESTO VA AFUERA SIEMPRE */
@keyframes gridMove {
  0% {
    background-position: 0 0, 0 0;
  }
  100% {
    background-position: 40px 40px, 40px 40px;
  }
}
  </style>
</head>

<body>
<div class="background-grid"></div>
<div class="particles"></div>

<div class="banner">Piero Hacks</div>

<div class="container">
  <h2>Crear Cuenta</h2>

  <form id="registerForm">
    <label>Nombre de Usuario</label>
    <input type="text" id="username" placeholder="Usuario único (mínimo 3 caracteres)" required>

    <label>Correo Electrónico</label>
    <input type="email" id="email" placeholder="tu@gmail.com"required>

<label>NUMERO DE WHATSSAP (OBLIGATORIO)</label>

<select id="countryCode">
 <option value="">Selecciona tu país...</option>
                                    <option value="US">🇺🇸 Estados Unidos (+1)</option>
                                    <option value="GT">🇬🇹 Guatemala (+502)</option>
                                    <option value="BZ">🇧🇿 Belice (+501)</option>
                                    <option value="SV">🇸🇻 El Salvador (+503)</option>
                                    <option value="HN">🇭🇳 Honduras (+504)</option>
                                    <option value="NI">🇳🇮 Nicaragua (+505)</option>
                                    <option value="CR">🇨🇷 Costa Rica (+506)</option>
                                    <option value="PA">🇵🇦 Panamá (+507)</option>
                                    <option value="CU">🇨🇺 Cuba (+53)</option>
                                    <option value="DO">🇩🇴 República Dominicana (+1)</option>
                                    <option value="PR">🇵🇷 Puerto Rico (+1)</option>
                                    <option value="MX">🇲🇽 México (+52)</option>
                                    <option value="CO">🇨🇴 Colombia (+57)</option>
                                    <option value="VE">🇻🇪 Venezuela (+58)</option>
                                    <option value="EC">🇪🇨 Ecuador (+593)</option>
                                    <option value="PE">🇵🇪 Perú (+51)</option>
                                    <option value="BO">🇧🇴 Bolivia (+591)</option>
                                    <option value="PY">🇵🇾 Paraguay (+595)</option>
                                    <option value="CL">🇨🇱 Chile (+56)</option>
                                    <option value="AR">🇦🇷 Argentina (+54)</option>
                                    <option value="UY">🇺🇾 Uruguay (+598)</option>
                                    <option value="BR">🇧🇷 Brasil (+55)</option>
                                    <option value="ES">🇪🇸 España (+34)</option>
</select>

<div class="phone-box">
  <div id="prefix">+</div>
  <input type="tel" id="phone" placeholder="Número de WHATSAPP" required>
</div>

<div class="country-info" id="countryInfo">
  Selecciona tu país
</div>

<p class="phone-help">
  Selecciona tu país y escribe solo el número de whatsapp sin el código
</p>

    <label>Contraseña</label>
<div class="input-wrapper">
  <input type="password" id="password" placeholder="Contraseña minimo 6 caracteres" required>
  <i class="fas fa-eye password-toggle" id="togglePassword"></i>
</div>

    <label>Confirmar Contraseña</label>
<div class="input-wrapper">
  <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
  <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
</div>

    <div class="terms-container">
      <input type="checkbox" id="termsCheckbox" required>
      <span>
        Acepto los 
        <a href="condiciones.html" target="_blank">Términos y Condiciones</a>
        de esta pagina web al registrarme.
    
      </span>
    </div>

    <button type="submit" id="submitBtn">Crear Cuenta</button>
    <p id="errorMsg" class="message"></p>
  </form>

  <div class="link">
    ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword, sendEmailVerification, deleteUser } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const form = document.getElementById('registerForm');
const errorMsg = document.getElementById('errorMsg');
const submitBtn = document.getElementById('submitBtn');

/* 🔥 DETECCIÓN AUTOMÁTICA DE PAÍS */
fetch("https://ipapi.co/json/")
  .then(res => res.json())
  .then(data => {
    if (data.country_code && countryCodes[data.country_code]) {
      countrySelect.value = data.country_code;
      updateCountryUI();
    }
  })
  .catch(() => {});

const countrySelect = document.getElementById("countryCode");
const prefix = document.getElementById("prefix");
const countryInfo = document.getElementById("countryInfo");

const countryCodes = {
  'US': { name: 'Estados Unidos', code: '+1', flag: '🇺🇸' },
                'GT': { name: 'Guatemala', code: '+502', flag: '🇬🇹' },
                'BZ': { name: 'Belice', code: '+501', flag: '🇧🇿' },
                'SV': { name: 'El Salvador', code: '+503', flag: '🇸🇻' },
                'HN': { name: 'Honduras', code: '+504', flag: '🇭🇳' },
                'NI': { name: 'Nicaragua', code: '+505', flag: '🇳🇮' },
                'CR': { name: 'Costa Rica', code: '+506', flag: '🇨🇷' },
                'PA': { name: 'Panamá', code: '+507', flag: '🇵🇦' },
                'CU': { name: 'Cuba', code: '+53', flag: '🇨🇺' },
                'DO': { name: 'República Dominicana', code: '+1', flag: '🇩🇴' },
                'PR': { name: 'Puerto Rico', code: '+1', flag: '🇵🇷' },
                'MX': { name: 'México', code: '+52', flag: '🇲🇽' },
                'CO': { name: 'Colombia', code: '+57', flag: '🇨🇴' },
                'VE': { name: 'Venezuela', code: '+58', flag: '🇻🇪' },
                'EC': { name: 'Ecuador', code: '+593', flag: '🇪🇨' },
                'PE': { name: 'Perú', code: '+51', flag: '🇵🇪' },
                'BO': { name: 'Bolivia', code: '+591', flag: '🇧🇴' },
                'PY': { name: 'Paraguay', code: '+595', flag: '🇵🇾' },
                'CL': { name: 'Chile', code: '+56', flag: '🇨🇱' },
                'AR': { name: 'Argentina', code: '+54', flag: '🇦🇷' },
                'UY': { name: 'Uruguay', code: '+598', flag: '🇺🇾' },
                'BR': { name: 'Brasil', code: '+55', flag: '🇧🇷' },
                'ES': { name: 'España', code: '+34', flag: '🇪🇸' }
            };


function updateCountryUI() {
  const code = countrySelect.value;
  const data = countryCodes[code];

  // 👉 si no hay país seleccionado
  if (!code || !data) {
    prefix.textContent = "+";
    countryInfo.textContent = "Selecciona tu país";
    return;
  }

  // 👉 si ya eligió país
  prefix.textContent = data.code;
  countryInfo.textContent = `${data.flag} ${data.name} ${data.code}`;
}
// 🔥 cuando cambias país
countrySelect.addEventListener("change", updateCountryUI);

// 🔥 inicial
updateCountryUI();

/* 🔥 TU LÓGICA ORIGINAL */
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  submitBtn.disabled = true;
  submitBtn.textContent = "Procesando...";

  const username = document.getElementById('username').value.trim().toLowerCase();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const countryCode = document.getElementById('countryCode').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) return showError("⚔️ Las contraseñas no coinciden.");
  if (password.length < 6) return showError("🔐 La contraseña debe tener mínimo 6 caracteres.");
  if (username.length < 3) return showError("👤 El usuario debe tener al menos 3 caracteres.");

  try {
    const usernameRef = doc(db, "usernames", username);
    const usernameSnap = await getDoc(usernameRef);

    if (usernameSnap.exists()) return showError("⚡ Ese nombre de usuario ya está en uso.");

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(usernameRef, { uid: user.uid });
    await setDoc(doc(db, "usuarios", user.uid), {
      username,
      email,
     phone: countryCodes[countryCode].code + phone,
      createdAt: new Date(),
      role: "user"
    });

    await sendEmailVerification(user);

    errorMsg.textContent = "📧 Revisa tu correo para verificar tu cuenta.";
    errorMsg.className = "message success";

    setTimeout(() => { window.location.href = "index.html"; }, 3000);

  } catch (error) {
    showError(error.message);
  }
});

function showError(message) {
  errorMsg.textContent = message;
  errorMsg.className = "message error";
  submitBtn.disabled = false;
  submitBtn.textContent = "Crear Cuenta";
}
const togglePassword = document.getElementById('togglePassword');
const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
const passwordInput = document.getElementById('password');
const confirmPasswordInput = document.getElementById('confirmPassword');

function setupToggle(toggle, input) {
  toggle.addEventListener('click', () => {
    const type = input.type === 'password' ? 'text' : 'password';
    input.type = type;

    if (type === 'text') {
      toggle.classList.remove('fa-eye');
      toggle.classList.add('fa-eye-slash');
    } else {
      toggle.classList.remove('fa-eye-slash');
      toggle.classList.add('fa-eye');
    }
  });
}

setupToggle(togglePassword, passwordInput);
setupToggle(toggleConfirmPassword, confirmPasswordInput);
</script>

</body>
</html>
