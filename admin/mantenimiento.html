
 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANTENIMIENTO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#050507;
color:#fff;
overflow:hidden;
}

/* ===== FONDO IGUAL ADMIN ===== */
.background{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:
radial-gradient(circle at 20% 20%, #00ffff22, transparent 40%),
radial-gradient(circle at 80% 80%, #ff00ff22, transparent 40%),
#050507;
}

/* ===== BOTON VOLVER ===== */
.volver{
position:fixed;
top:25px;
left:25px;
padding:12px 20px;
border-radius:14px;

background:linear-gradient(135deg,#00ffff,#00ff88);
color:#000;
font-weight:800;

cursor:pointer;

box-shadow:
0 0 20px #00ffff,
0 0 40px #00ff88;

transition:.3s;
}

.volver:hover{
transform:scale(1.1);
}

/* ===== CENTRO ===== */
.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* ===== BOX PRINCIPAL ===== */
.box{
width:420px;
padding:40px;
border-radius:25px;

background:linear-gradient(145deg,#06060f,#0b0b12);

border:1px solid rgba(0,255,255,0.1);

box-shadow:
0 0 25px #00ffff33,
0 0 80px #ff00ff22,
inset 0 0 30px #00ffff11;

position:relative;
overflow:hidden;

text-align:center;
}

/* BORDE PRO */
.box::after{
content:"";
position:absolute;
inset:0;
border-radius:25px;
padding:1px;

background:linear-gradient(120deg,#00ffff,transparent,#ff00ff);

-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

opacity:0.4;
}

/* ===== TITULO ===== */
.box h1{
font-size:30px;
margin-bottom:10px;
font-weight:900;

background:linear-gradient(90deg,#00ffff,#00ff88);
-webkit-background-clip:text;
color:transparent;

text-shadow:
0 0 20px #00ffff,
0 0 40px #00ff88;
}

/* TEXTO */
.box p{
color:#aaa;
font-size:13px;
margin-bottom:25px;
}

/* ===== ESTADO ===== */
.estado{
font-size:16px;
font-weight:900;
margin-bottom:15px;
}

.on{color:#00ff9c;}
.off{color:#ff3b3b;}

/* ===== BOTON SWITCH ===== */
.toggle{
padding:14px 30px;
border:none;
border-radius:14px;
cursor:pointer;

font-weight:900;
font-size:14px;

background:linear-gradient(90deg,#ff3b3b,#ff00ff);
color:#fff;

box-shadow:0 0 15px #ff00ff;

transition:.3s;
}

.toggle.active{
background:linear-gradient(90deg,#00ff9c,#00ffff);
color:#000;
box-shadow:0 0 20px #00ffff;
}

.toggle:hover{
transform:scale(1.1);
}

/* ===== MENSAJE FINAL ===== */
.msg{
margin-top:25px;
font-size:12px;
color:#888;
}

/* 🔥 CONTROL */
.control{
display:flex;
align-items:center;
justify-content:space-between;
margin:25px 0;
}

/* TEXTO */
.label{
font-size:14px;
font-weight:900;
color:#aaa;
letter-spacing:1px;
}

/* 🔥 SWITCH BASE */
.switch{
width:70px;
height:34px;
border-radius:50px;
background:#111;
position:relative;
cursor:pointer;
transition:.4s;

box-shadow:
inset 0 0 10px #000,
0 0 10px #000;
}

/* 🔥 CIRCULO */
.circle{
width:28px;
height:28px;
border-radius:50%;
background:#ff3b3b;
position:absolute;
top:3px;
left:4px;
transition:.4s;

box-shadow:0 0 10px #ff3b3b;
}

/* 🔥 ACTIVO */
.switch.active{
background:#001f1a;
box-shadow:
0 0 15px #00ff88,
inset 0 0 10px #00ff88;
}

.switch.active .circle{
left:38px;
background:#00ff88;
box-shadow:0 0 15px #00ff88;
}

.switch {
  position: relative;
  z-index: 9999;
}
.box {
  pointer-events: none;
}

.switch {
  pointer-events: auto;
}


</style>
</head>

<body>

<div class="background"></div>

<div class="volver" onclick="window.location.href='index.html'">
← VOLVER
</div>

<div class="container">

<div class="box">

<h1>⚙️ MODO MANTENIMIENTO</h1>
<p>Controla el estado global de la tienda</p>

<div class="control">
  <span class="label">MANTENIMIENTO</span>

 <button id="toggleSwitch" class="switch">
  <div class="circle"></div>
</button>
</div>

<div id="estadoTxt" class="estado off">🔴 TIENDA ACTIVA</div>

</div>

</div>

<script type="module">

console.log("🔥 JS ARRANCÓ");

import { db } from "../js/firebase.js";
import {
  doc,
  setDoc,
  updateDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const estadoTxt = document.getElementById("estadoTxt");
const switchBtn = document.getElementById("toggleSwitch");

const ref = doc(db,"config","web");

let activo = false;

// 🔥 ESCUCHAR FIREBASE
onSnapshot(ref, async (snap)=>{

  if(snap.exists()){
    activo = snap.data().mantenimiento;
  }else{
    await setDoc(ref,{ mantenimiento:false });
    activo = false;
  }

  actualizarUI();
});

// 🔥 UI
function actualizarUI(){
  if(activo){
    estadoTxt.textContent = "🟢 MANTENIMIENTO ACTIVADO";
    estadoTxt.className = "estado on";
    switchBtn.classList.add("active");
  }else{
    estadoTxt.textContent = "🔴 TIENDA ACTIVA";
    estadoTxt.className = "estado off";
    switchBtn.classList.remove("active");
  }
}

// 🔥 CLICK
switchBtn.addEventListener("click", async () => {

  console.log("🔥 CLICK DETECTADO");

  try {

    const nuevoEstado = !activo;

    await updateDoc(ref,{
      mantenimiento: nuevoEstado
    });

    console.log("✅ FIREBASE OK");

  } catch(e){
    console.error("💥 ERROR:", e);
  }

});
</script>

</body>
</html>
