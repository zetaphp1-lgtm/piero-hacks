<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  .password-wrapper {
  position: relative;
}

.eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 26px;
  height: 16px;
  border: 2px solid #555;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

.eye::before {
  content: "";
  position: absolute;
  width: 6px;
  height: 6px;
  background: #555;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.eye.closed {
  border-radius: 2px;
  height: 2px;
  background: #555;
}

.eye.closed::before {
  display: none;
}

  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;

    color: #fff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding-top: 80px;
    overflow-y: auto;
  }

  .banner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: linear-gradient(90deg, #ff00ff, #00ffff);
    color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 10px #fff, 0 0 20px #00ffff;
    z-index: 1000;
  }

  .container {
    background: rgba(15, 15, 35, 0.95);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
    width: 90%;
    max-width: 400px;
    border: 2px solid #00ffcc;
    margin-bottom: 40px;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff;
  }

  label {
    display: block;
    margin-top: 10px;
    color: #ff00ff;
    font-size: 14px;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #1b1b35;
    color: #fff;
    font-size: 16px;
    box-sizing: border-box;
  }

  input:focus {
    outline: none;
    border: 2px solid #00ffff;
    box-shadow: 0 0 10px #00ffff;
  }

  button {
    background: linear-gradient(90deg, #ff00ff, #00ffff);
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 10px #ff00ff, 0 0 15px #00ffff;
  }

  button:hover {
    box-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff;
    transform: scale(1.05);
  }

  p.message {
    min-height: 24px;
    text-align: center;
    font-weight: bold;
    font-size: 14px;
  }
  p.message.error { color: #ff4d4d; text-shadow: 0 0 5px #ff4d4d; }
  p.message.success { color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }

  .link {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
  }
  .link a {
    color: #ff00ff;
    text-decoration: none;
    font-weight: bold;
  }
  .link a:hover {
    color: #00ffff;
  }

  .container::before {
    content: "🎮";
    font-size: 36px;
    display: block;
    text-align: center;
    margin-bottom: 10px;
  }

  /* 🔥 BOTÓN TELEGRAM OWNER 🔥 */
  .owner-contact {
    margin-top: 18px;
    text-align: center;
  }

  .telegram-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 14px;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(90deg, #0088cc, #00ffff);
    box-shadow: 0 0 12px #0088cc, 0 0 20px #00ffff;
    transition: 0.3s;
  }

  .telegram-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #0088cc, 0 0 35px #00ffff;
  }

  .telegram-btn svg {
    width: 18px;
    height: 18px;
  }

  @media (max-width: 480px) {
    .banner {
      height: 50px;
      font-size: 22px;
    }
    .container {
      padding: 20px;
    }
    input, button {
      padding: 10px;
      font-size: 14px;

    h2 {
      font-size: 20px;

  /* 🔥 FONDO GRID */
.background-grid {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;

  background-color: #0a0a0f;
  background-image:
    linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  @keyframes gridMove {
  0% {
    background-position: 0 0, 0 0;
  }
  100% {
    background-position: 40px 40px, 40px 40px;
  }
}
}

/* 🔥 GLOW */
.background-grid::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 70%);
  animation: glowMove 10s linear infinite;
}

@keyframes glowMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(40px,40px); }
  100% { transform: translate(0,0); }
}

/* 🔥 ASEGURA QUE EL CONTENIDO ESTE ENCIMA */
.container {
  position: relative;
  z-index: 1;
}

.particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
}

.particles::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(rgba(0,255,255,0.4) 1px, transparent 1px);
  background-size: 80px 80px;
  animation: particlesMove 25s linear infinite;
  opacity: 0.3;
}

@keyframes particlesMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100px); }
}

<script>
const togglePassword = document.getElementById("togglePassword");
const password = document.getElementById("password");

togglePassword.addEventListener("click", () => {
  const type = password.type === "password" ? "text" : "password";
  password.type = type;

  togglePassword.classList.toggle("fa-eye");
  togglePassword.classList.toggle("fa-eye-slash");
});
</script>
